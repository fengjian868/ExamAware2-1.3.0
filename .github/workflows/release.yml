name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'
      - 'trae/solo-agent-Dk1KvY'
      - 'trae/solo-agent-OIFC0O'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    env:
      PNPM_YES: 'true'
      HUSKY: '0'
      HUSKY_SKIP_INSTALL: '1'
      HUSKY_SKIP_HOOKS: '1'
      ELECTRON_BUILDER_CACHE: C:/Users/runneradmin/AppData/Local/Temp/eb-cache-${{ github.run_id }}
      ELECTRON_BUILDER_TMPDIR: C:/Users/runneradmin/AppData/Local/Temp/eb-tmp-${{ github.run_id }}
      ELECTRON_BUILDER_TMP_DIR: C:/Users/runneradmin/AppData/Local/Temp/eb-tmp-${{ github.run_id }}

    permissions:
  actions: write
  contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.2
          standalone: true

      - name: Force git to use HTTPS for GitHub
        run: 'git config --global url."https://github.com/".insteadOf git@github.com:'

      - name: Make pnpm non-interactive
        run: pnpm config set yes true

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Ensure electron-builder cache dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$Env:ELECTRON_BUILDER_CACHE" | Out-Null
          New-Item -ItemType Directory -Force -Path "$Env:ELECTRON_BUILDER_TMPDIR" | Out-Null

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build rpc package
        run: pnpm rpc:build

      - name: Build core package
        run: pnpm core:build

      - name: Build player package
        run: pnpm player:build

      - name: Build plugin SDK
        run: pnpm --filter @dsz-examaware/plugin-sdk build

      - name: Build desktop application
        run: pnpm desktop:build:win

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExamAware-Windows-${{ github.run_id }}
          path: packages/desktop/out/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v${{ github.run_number }}"
          $exePath = Get-ChildItem -Path packages/desktop/out -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $exePath) {
            Write-Error "No setup exe found in packages/desktop/out"
            exit 1
          }

          $releaseNotes = @"
          ## ExamAware v${{ github.run_number }}

          ### 更新内容

          - 新增：即将开考全屏特效提醒（橙色背景）
          - 新增：经典主题倒计时颜色（考前橙色、考试中绿色、结束前橙色）
          - 新增：设置中可选放映按钮行为（直接播放/选择文件）
          - 新增：最近放映文件记忆（最多5个）
          - 修复：即将开考提醒不显示的问题
          - 修复：托盘退出时播放器窗口不关闭的问题
          "@

          gh release create $tag $exePath.FullName `
            --title "ExamAware v${{ github.run_number }}" `
            --notes $releaseNotes `
            --latest

      - name: Generate download summary
        if: success()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = "${{ github.repository }}"
          $runId = "${{ github.run_id }}"
          $artifactName = "ExamAware-Windows-${{ github.run_id }}"
          $refName = "${{ github.ref_name }}"
          $runNumber = "${{ github.run_number }}"
          $commit = "${{ github.sha }}"

          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GH_TOKEN"
          }
          $artifactsUrl = "https://api.github.com/repos/$repo/actions/runs/$runId/artifacts"
          $response = Invoke-RestMethod -Uri $artifactsUrl -Headers $headers -MaximumRetryCount 3 -RetryIntervalSec 2
          $artifact = $response.artifacts | Where-Object { $_.name -eq $artifactName } | Select-Object -First 1

          $artifactId = $artifact.id
          $artifactUrl = "https://github.com/$repo/actions/runs/$runId/artifacts/$artifactId"
          $nightlyUrl = "https://nightly.link/$repo/actions/artifacts/$artifactId.zip"
          $ghproxyFastly = "https://ghproxy.cc/$nightlyUrl"
          $ghproxyMirror = "https://ghproxy.net/$nightlyUrl"

          @"
          ## 构建总结

          - 提交：$commit
          - 运行：#$runId
          - 版本：$refName-$runNumber

          ### 下载

          - [下载文物]($artifactUrl)
          - [Nightly.link 下载]($nightlyUrl)
          - [GhProxy Fastly Mirror]($ghproxyFastly)
          - [GhProxy Mirror]($ghproxyMirror)
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
